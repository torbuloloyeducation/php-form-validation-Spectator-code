<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Registration Form</h1>

<form action="process.php" method="POST">

    <h2>Personal Information</h2>

    <div class="field">
        <label for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="Jane Smith">
    </div>

    <div class="field">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="jane@example.com">
    </div>

    <div class="field">
        <label for="phone">Phone Number <span class="required">*</span></label>
        <input type="tel" id="phone" name="phone" placeholder="+63 912 345 6789">
        <div class="hint">Digits, spaces, dashes, optional leading +. 7–15 characters.</div>
    </div>

    <h2>Gender</h2>

    <div class="field">
        <label>Gender <span class="required">*</span></label>
        <div class="radio-group">
            <label><input type="radio" name="gender" value="Female"> Female</label>
            <label><input type="radio" name="gender" value="Male"> Male</label>
            <label><input type="radio" name="gender" value="Other"> Other</label>
        </div>
    </div>

    <h2>Online Presence</h2>

    <div class="field">
        <label for="website">Website (optional)</label>
        <input type="text" id="website" name="website" placeholder="https://yoursite.com">
    </div>

    <div class="field">
        <label for="comment">Comment (optional)</label>
        <textarea id="comment" name="comment"></textarea>
    </div>

    <h2>Password</h2>

    <div class="field">
        <label for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters">
    </div>

    <div class="field">
        <label for="confirm_password">Confirm Password <span class="required">*</span></label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password">
    </div>

    <h2>Terms</h2>

    <div class="field">
        <div class="checkbox-row">
            <input type="checkbox" id="terms" name="terms">
            <label for="terms">I agree to the <a href="#">Terms and Conditions</a>.</label>
        </div>
    </div>

    <input type="submit" value="Submit">

</form>

</body>
</html>
